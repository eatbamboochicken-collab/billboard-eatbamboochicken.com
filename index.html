        theme: {
          extend: {
            fontFamily: {

    <style>
      /* Gently color shift brand logo text */
      @keyframes colorShift {
        0% { color: #111111; }
        33% { color: #FFB81C; }
        66% { color: #FF5F1F; }
        100% { color: #111111; }
      }
      @keyframes colorShiftReverse {
        0% { color: #111111; }
        33% { color: #FF5F1F; }
        66% { color: #FFB81C; }
        100% { color: #111111; }
      }
      .color-shift-bamboo {
        animation: colorShift 5s infinite ease-in-out;
      }
      .color-shift-chicken {
        animation: colorShiftReverse 5s infinite ease-in-out;
      }

      // Main State Machine for Scene Transitions
      function triggerScene(sceneIdx) {
        // Hide all slides
        const slideOpening = document.getElementById("slide-opening");
        const slideProduct = document.getElementById("slide-product");
        const slideFinal = document.getElementById("slide-final");

        slideOpening.className = "absolute inset-0 w-full h-full flex flex-col items-center justify-center bg-white px-8 text-center transition-opacity duration-1000 opacity-0 pointer-events-none z-10";
        slideProduct.className = "absolute inset-0 w-full h-full bg-[#FCFAF5] flex flex-col justify-between overflow-hidden transition-opacity duration-1000 opacity-0 pointer-events-none z-10";
        slideFinal.className = "absolute inset-0 w-full h-full bg-[#FCFAF5] flex flex-col justify-between px-6 py-8 text-center overflow-hidden transition-opacity duration-1000 opacity-0 pointer-events-none z-10";

        const currentScene = SCENES[sceneIdx];

        if (currentScene.type === "opening") {
          // Reset elements
          const b = document.getElementById("opening-bamboo");
          const c = document.getElementById("opening-chicken");
          const bg = document.getElementById("opening-badge");
          const t1 = document.getElementById("opening-tagline-crispy");
          const t2 = document.getElementById("opening-tagline-magic");

          b.className = "font-display font-black text-5xl sm:text-6xl tracking-tight uppercase leading-none color-shift-bamboo opacity-0 transition-opacity duration-1000";
          c.className = "font-display font-black text-5xl sm:text-6xl tracking-tight uppercase leading-none color-shift-chicken transform translate-x-12 opacity-0 transition-all duration-1000 ease-out";
          bg.className = "mt-4 flex items-center gap-1.5 opacity-0 transition-opacity duration-800";
          t1.className = "absolute font-display font-black text-2xl sm:text-3xl text-[#FF5F1F] leading-tight tracking-tight max-w-[280px] opacity-0 transition-opacity duration-500";
          t2.className = "absolute font-display font-black text-2xl sm:text-3xl text-[#FFB81C] leading-tight tracking-tight max-w-[280px] opacity-0 transition-opacity duration-500";

          // Show slide
          slideOpening.classList.remove("opacity-0", "pointer-events-none");
          slideOpening.classList.add("opacity-100", "pointer-events-auto");

          // Trigger Opening Animations
          setTimeout(() => {
            b.classList.remove("opacity-0");
            b.classList.add("opacity-100");
          }, 100);

          setTimeout(() => {
            c.classList.remove("opacity-0", "translate-x-12");
            c.classList.add("opacity-100", "translate-x-0");
          }, 300);

          setTimeout(() => {
            bg.classList.remove("opacity-0");
            bg.classList.add("opacity-100");
          }, 600);

          // Tagline Timeline Part 1 (0.8s to 2.8s)
          setTimeout(() => {
            t1.classList.remove("opacity-0");
            t1.classList.add("opacity-100");
          }, 800);

          setTimeout(() => {
            t1.classList.remove("opacity-100");
            t1.classList.add("opacity-0");
          }, 2800);

          // Tagline Timeline Part 2 (3.0s onwards)
          setTimeout(() => {
            t2.classList.remove("opacity-0");
            t2.classList.add("opacity-100");
          }, 3100);

        } else if (currentScene.type === "product") {
          // Reset Image Scale & Info Card
          const img = document.getElementById("product-image");
          const card = document.getElementById("product-card");

          img.src = currentScene.product.image;
          img.alt = currentScene.product.name;
          document.getElementById("product-name").innerText = currentScene.product.name;
          document.getElementById("product-price").innerText = currentScene.product.price;

          img.className = "w-full h-full max-h-[75vh] object-contain drop-shadow-[0_24px_48px_rgba(0,0,0,0.12)] z-10 transform scale-[0.98] transition-transform ease-linear";
          card.className = "bg-white/95 backdrop-blur-md rounded-2xl p-6 border border-neutral-100/80 shadow-[0_20px_40px_rgba(0,0,0,0.06)] flex flex-col gap-1 transform translate-y-8 opacity-0 transition-all duration-800";

          // Show slide
          slideProduct.classList.remove("opacity-0", "pointer-events-none");
          slideProduct.classList.add("opacity-100", "pointer-events-auto");

          // Start subtle Ken Burns slow zoom transition
          setTimeout(() => {
            img.style.transitionDuration = "8000ms";
            img.classList.remove("scale-[0.98]");
            img.classList.add("scale-[1.12]");
          }, 50);

          // Slide Info Card Up
          setTimeout(() => {
            card.classList.remove("opacity-0", "translate-y-8");
            card.classList.add("opacity-100", "translate-y-0");
          }, 300);

        } else if (currentScene.type === "final") {
          // Render Responsive Social Elements
          renderSocialScreen();

          // Show slide
          slideFinal.classList.remove("opacity-0", "pointer-events-none");
          slideFinal.classList.add("opacity-100", "pointer-events-auto");
        }

        // Setup next scene timeout loop
        setTimeout(() => {
          currentSceneIdx = (currentSceneIdx + 1) % SCENES.length;
          triggerScene(currentSceneIdx);
        }, currentScene.duration);
      }

      // 4. Initialize On Load
      window.addEventListener("DOMContentLoaded", () => {
        preloadImages();
        startHeaderTaglineRotation();
        triggerScene(currentSceneIdx);
      });
    </script>
